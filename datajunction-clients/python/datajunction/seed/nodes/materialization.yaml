name: ${prefix}materialization
node_type: dimension
display_name: Materialization
description: ''
query: |-
  SELECT
    M.name,
    M.id,
    M.node_revision_id,
    M.job,
    M.strategy,
    M.schedule
  FROM source.dj_metadata.public.materialization M
columns:
- name: id
  attributes:
  - hidden
- name: node_revision_id
  attributes:
  - hidden
- name: name
  display_name: Materialization Name
  attributes:
  - hidden
- name: job
  display_name: Orchestrator Job
  attributes:
  - hidden
- name: strategy
  display_name: Strategy
- name: schedule
  display_name: Schedule
primary_key:
- id
dimension_links:
- type: join
  dimension_node: ${prefix}nodes
  join_type: inner
  join_on: ${prefix}materialization.node_revision_id = ${prefix}nodes.current_revision_id
tags: []
